displayName: Traefik Auth Bridge
type: middleware
import: github.com/JohnKiller/traefik-auth-bridge
summary: A session-oriented alternative to ForwardAuth using an external authorization portal, one-time codes, browser state, and signed cookies.
testData:
  cookieName: __Host-traefik-auth
  cookieTTL: 3600
  serviceID: example-service
  masterKey: catalog-validation-master-key-32-bytes
  authorizationURL: https://login.example.com/authorize
  returnURLParameter: rd
  callbackPath: /_auth/callback
  authorizationCodeParameter: code
  redeemURL: https://login.example.com/redeem
  redeemCodeParameter: code
